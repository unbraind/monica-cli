name: Publish Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish'
        required: false
        default: 'master'
      dry_run:
        description: 'Set to true to validate/package only (no publish)'
        required: false
        default: 'true'
      confirm:
        description: 'Set to PUBLISH to allow non-dry-run publishing'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release quality gates
        run: bun run verify:release

      - name: Capture release metadata
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag is not published yet
        run: |
          if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release tag ${{ steps.meta.outputs.tag }} already exists."
            exit 1
          fi

      - name: Package
        run: node scripts/with-npm-version.mjs npm pack

      - name: Stop if dry-run
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run enabled: skipping publish."

      - name: Enforce explicit publish confirmation
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PUBLISH" ]; then
            echo "Missing publish confirmation. Set confirm=PUBLISH."
            exit 1
          fi

      - name: Publish package
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/with-npm-version.mjs npm publish --provenance --access public

      - name: Create and push release tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "release: ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
