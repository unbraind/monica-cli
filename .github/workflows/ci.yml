name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit-messages:
    name: Commit Message Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lint PR commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  validate:
    name: Validate (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependency graph
        run: bun run audit:dependencies

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck operational scripts
        run: bun run typecheck:scripts

      - name: Lint
        run: bun run lint

      - name: Enforce source quality and docstrings
        run: bun run lint:source-quality

      - name: Detect duplicated source
        run: bun run lint:duplication

      - name: Verify pm-generated changelog
        run: bun run changelog:pm:check && bun run changelog:preservation:check

      - name: Build
        run: bun run build

      - name: Test with 100% coverage
        run: bun run test:coverage

      - name: Verify complete command help
        run: bun run test:e2e:help

      - name: Smoke test bunx execution
        run: bun run smoke:bunx

      - name: History secret scan
        run: bun run audit:history

      - name: Version history policy scan
        run: bun run audit:version-history

      - name: Enforce versioning on master
        if: github.ref == 'refs/heads/master'
        run: bun run version:check:format

  validate-npm:
    name: Validate (Node + npm/npx)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies with npm
        run: npm install --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck operational scripts
        run: npm run typecheck:scripts

      - name: Lint
        run: npm run lint

      - name: Enforce source quality and docstrings
        run: npm run lint:source-quality

      - name: Detect duplicated source
        run: npm run lint:duplication

      - name: Build
        run: npm run build

      - name: Test with 100% coverage
        run: npm run test:coverage

      - name: Smoke test npx execution
        run: npm run smoke:npx
