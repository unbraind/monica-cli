name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to validate (branch, tag, or SHA)'
        required: false
        default: 'master'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release quality gates
        run: bun run verify:release

      - name: Verify release tag is not published yet
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Release tag ${TAG} already exists."
            exit 1
          fi

      - name: Build release tarball
        run: node scripts/with-npm-version.mjs npm pack

      - name: Generate release summary
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          {
            echo "# Release Preparation Summary"
            echo
            echo "- Ref: ${{ inputs.ref }}"
            echo "- Commit: $(git rev-parse HEAD)"
            echo "- Version: ${VERSION}"
            echo "- Date (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > RELEASE_PREP.md

      - name: Upload preparation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-prep-${{ github.run_id }}
          path: |
            *.tgz
            RELEASE_PREP.md
