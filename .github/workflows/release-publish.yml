name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to publish or recover'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: release

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node.js and npm registry
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag, version, changelog, and release gates
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${tag}" != "v${package_version}" || "${version}" != "${package_version}" ]]; then
            echo "Release tag ${tag} does not match package.json version ${package_version}."
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          bun run verify:release

      - name: Build release tarball
        run: node scripts/with-npm-version.mjs npm pack

      - name: Publish package to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.metadata.outputs.version }}
        shell: bash
        run: |
          if npm view "monica-cli@${VERSION}" version >/dev/null 2>&1; then
            echo "monica-cli@${VERSION} already exists on npm; skipping duplicate publish."
          else
            node scripts/with-npm-version.mjs npm publish --access public --provenance
          fi

      - name: Verify npm, npx, and bunx consumers
        run: node scripts/release/verify-published-release.mjs --version "${{ steps.metadata.outputs.version }}" --skip-github-release

      - name: Generate pm-backed GitHub release notes
        run: node scripts/release/extract-release-notes.mjs --version "${{ steps.metadata.outputs.version }}" --output RELEASE_NOTES.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: monica-cli-${{ steps.metadata.outputs.version }}
          path: |
            monica-cli-*.tgz
            RELEASE_NOTES.md

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: monica-cli-*.tgz

      - name: Verify final public release surfaces
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/release/verify-published-release.mjs --version "${{ steps.metadata.outputs.version }}" --json
