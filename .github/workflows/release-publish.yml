name: Publish Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to publish'
        required: false
        default: 'master'
      confirm:
        description: 'Set to PUBLISH to allow publishing'
        required: true
        default: ''

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Enforce explicit publish confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "PUBLISH" ]; then
            echo "Missing publish confirmation. Set confirm=PUBLISH."
            exit 1
          fi

      - name: Validate release quality gates
        run: bun run verify:release

      - name: Synchronize release ref into master
        env:
          SOURCE_REF: ${{ github.event.inputs.ref || 'master' }}
        run: |
          set -euo pipefail

          git fetch origin --prune --tags
          if ! git rev-parse --verify "${SOURCE_REF}^{commit}" >/dev/null 2>&1; then
            if git rev-parse --verify "origin/${SOURCE_REF}^{commit}" >/dev/null 2>&1; then
              SOURCE_REF="origin/${SOURCE_REF}"
            else
              echo "Could not resolve ref: ${SOURCE_REF}"
              exit 1
            fi
          fi

          git checkout --detach "${SOURCE_REF}"
          SOURCE_SHA="$(git rev-parse HEAD)"
          echo "Resolved source ref: ${SOURCE_REF}"
          echo "Source commit: ${SOURCE_SHA}"

          git checkout -B master origin/master
          MASTER_SHA="$(git rev-parse HEAD)"

          if [ "${MASTER_SHA}" = "${SOURCE_SHA}" ]; then
            echo "Source commit is already on master."
          else
            git merge --ff-only "${SOURCE_SHA}"
            git push origin HEAD:master
            echo "Fast-forwarded and pushed master to $(git rev-parse HEAD)."
          fi

      - name: Capture release metadata
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag is not published yet
        run: |
          if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release tag ${{ steps.meta.outputs.tag }} already exists."
            exit 1
          fi

      - name: Package
        run: node scripts/with-npm-version.mjs npm pack

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/with-npm-version.mjs npm publish --provenance --access public

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "release: ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
