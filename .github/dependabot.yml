version: 2
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
    groups:
      production-dependencies:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      development-dependencies:
        dependency-type: 'development'
        update-types: ['minor', 'patch']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:30'
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(ci)'
